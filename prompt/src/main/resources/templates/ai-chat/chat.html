<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <title>Prompt AI - Chat</title>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/ai-common.css}">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/mypage.js}"></script>
    <script th:src="@{/js/chat.js}" defer></script>
</head>
<body>

<!-- 마이페이지 팝업 -->
<div th:insert="~{fragments/mypage-modal :: mypage-modal}"></div>

<!-- 사이드바 -->
<aside id="aside">

    <header>
        <!-- 로고: 메인페이지 이동 앵커 -->
        <a href="/" aria-label="Prompt AI 메인 페이지로 이동">
            <span>PromptAI</span>
        </a>
        <!-- 메뉴 토글 버튼 (오른쪽) -->
        <button id="btnToggle" aria-expanded="true" aria-controls="aside">
            <span class="srOnly">사이드바 메뉴 열기/닫기</span>
        </button>
    </header>

    <!-- AI 도구 버튼 -->
    <div id="sidebarAiTools">
        <a th:href="@{/ai-tools}">AI 도구</a>
    </div>

    <!-- 새 채팅 버튼 -->
    <div id="sidebarNew">
        <button id="btnNew">+ 새 채팅</button>
    </div>

    <!-- 채팅방 목록 -->
    <nav aria-label="채팅 목록">
        <p>Chats</p>
        <ul id="roomList"></ul>
    </nav>

    <!-- aside 하단 -->
    <div id="sidebarBottom">
        <div>
            <img src="https://ui-avatars.com/api/?name=User&background=eee&color=333&size=32" alt="프로필 이미지">
            <!-- 이름 표시 -->
            <span id="userEmail"
                  th:text="${myInfo?.username}"
                  th:data-plan="${myInfo?.planName}"></span>
        </div>

        <!-- 설정 버튼 (배경 이미지) -->
        <button id="btnSettings" aria-haspopup="true" aria-expanded="false">
            <span class="srOnly">설정 메뉴 열기</span>
        </button>

        <ul id="settingsMenu" class="hidden" role="menu" aria-label="설정 메뉴">
            <li role="none"><button role="menuitem" class="mypage-open-btn" data-action="profile">마이페이지</button></li>
            <li role="none"><button role="menuitem" data-action="theme">다크모드</button></li>
            <li role="none"><button role="menuitem" data-action="plan">플랜 업그레이드</button></li>
            <li role="none"><button role="menuitem" data-action="help">도움말</button></li>
        </ul>
    </div>

</aside>

<!-- 메인 -->
<main>

    <!-- 빈 상태: 화면 정 가운데 입력창 -->
    <div id="empty">
        <div>
            <h1>
                <!-- 이름 표시 -->
                <span id="greetName" th:text="${myInfo?.username + '님'}">회원님</span>
                무엇이 궁금하십니까?
            </h1>
            <div class="inputBox">
                <textarea id="emptyInput" rows="1" placeholder="메시지를 입력하세요..." aria-label="채팅 메시지 입력"></textarea>
                <button id="emptySendBtn">
                    <span class="srOnly">전송</span>
                </button>
            </div>
            <div class="toolBar">
                <div class="modelSelector" id="emptyModelSelector">
                    <button data-model="alan-4.0" aria-pressed="true">alan-4.0</button>
                    <button data-model="alan-4.1" aria-pressed="false">alan-4.1</button>
                    <button data-model="alan-4-turbo" aria-pressed="false">alan-4-turbo</button>
                </div>
                <a href="/ai-tools" id="btnAiTools">AI 도구</a>
            </div>
        </div>
    </div>

    <!-- 채팅 뷰 -->
    <section id="chatView" class="hidden" aria-label="채팅 화면">

        <div id="messagesWrap">
            <div id="messages" aria-live="polite" aria-label="채팅 메시지 목록"></div>
        </div>

        <!-- 채팅 입력 영역 -->
        <div id="chatInputArea">
            <div class="inputBox">
                <textarea id="userInput" rows="1" placeholder="무엇을 도와드릴까요?" aria-label="채팅 메시지 입력"></textarea>
                <button id="sendBtn">
                    <span class="srOnly">전송</span>
                </button>
            </div>
            <div class="toolBar">
                <div class="modelSelector" id="chatModelSelector">
                    <button data-model="alan-4.0" aria-pressed="true">alan-4.0</button>
                    <button data-model="alan-4.1" aria-pressed="false">alan-4.1</button>
                    <button data-model="alan-4-turbo" aria-pressed="false">alan-4-turbo</button>
                </div>
                <a href="/ai-tools" id="btnAiTools">AI 도구</a>
            </div>
        </div>

    </section>

</main>

<!-- 토스트 알림 -->
<div id="toast" role="alert" aria-live="assertive"></div>

</body>
</html>
