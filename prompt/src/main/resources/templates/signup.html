<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Prompt AI</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/signup.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/signup.js}"></script>
    <script th:src="@{/js/mypage.js}"></script>
</head>
<body>

<!-- nav -->
<nav id="nav">
    <div>
        <a th:href="@{/}" id="nav-logo">Prompt AI</a>
        <div>
            <button id="dark-toggle" aria-label="다크모드 토글"></button>

            <!-- 비로그인 상태 -->
            <th:block sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">로그인</a>
                <a th:href="@{/signup}">회원가입</a>
            </th:block>

            <!-- 로그인 상태 -->
            <th:block sec:authorize="isAuthenticated()">
                <button type="button" id="mypage-btn" class="nav-mypage-btn">마이페이지</button>
                <form th:action="@{/logout}" method="post" id="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="nav-logout-btn">로그아웃</button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<!-- 마이페이지 팝업 -->
<div th:insert="~{fragments/mypage-modal :: mypage-modal}"></div>

<!-- signup -->
<main id="signup">
    <div>
        <div>
            <h1>회원가입</h1>
            <p>Prompt AI와 함께 시작하세요.</p>
        </div>

        <!-- 회원가입 폼 -->
        <div id="signup-form">

            <!-- 아이디 -->
            <div class="form-group">
                <label for="userid">아이디</label>
                <div class="input-row">
                    <input type="text" id="userid" name="userid" placeholder="아이디를 입력하세요" autocomplete="username">
                    <button type="button" id="check-id-btn">중복확인</button>
                </div>
                <span class="field-msg" id="userid-msg"></span>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password">
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label for="password-confirm">비밀번호 확인</label>
                <input type="password" id="password-confirm" name="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
                <span class="field-msg" id="password-msg"></span>
            </div>

            <!-- 이름 -->
            <div class="form-group">
                <label for="username">이름</label>
                <input type="text" id="username" name="username" placeholder="이름을 입력하세요">
            </div>

            <!-- 이메일 -->
            <div class="form-group">
                <label for="email">이메일</label>
                <div class="input-row">
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" autocomplete="email">
                    <button type="button" id="send-email-btn">인증번호 발송</button>
                </div>
                <span class="field-msg" id="email-msg"></span>
            </div>

            <!-- 인증번호 -->
            <div class="form-group" id="verify-group">
                <label for="verify-code">인증번호</label>
                <div class="input-row">
                    <input type="text" id="verify-code" placeholder="인증번호를 입력하세요">
                    <button type="button" id="verify-btn">확인</button>
                </div>
                <span class="field-msg" id="verify-msg"></span>
            </div>

            <!-- 약관 동의 -->
            <div id="terms">
                <div class="terms-all">
                    <input type="checkbox" id="agree-all">
                    <label for="agree-all">전체 동의</label>
                </div>
                <div class="terms-divider"></div>
                <div class="terms-item">
                    <input type="checkbox" id="agree-service" class="agree-item">
                    <label for="agree-service"><span class="required">[필수]</span> 서비스 이용약관 동의</label>
                </div>
                <div class="terms-item">
                    <input type="checkbox" id="agree-privacy" class="agree-item">
                    <label for="agree-privacy"><span class="required">[필수]</span> 개인정보 처리방침 동의</label>
                </div>
                <div class="terms-item">
                    <input type="checkbox" id="agree-marketing" class="agree-item">
                    <label for="agree-marketing"><span class="optional">[선택]</span> 마케팅 정보 수신 동의</label>
                </div>
            </div>

            <!-- 에러 메시지 -->
            <div id="signup-error">
                <span id="signup-error-msg"></span>
            </div>

            <!-- 회원가입 버튼 -->
            <button type="button" id="signup-btn">회원가입</button>

        </div>

        <!-- 하단 링크 -->
        <div id="signup-links">
            <span>이미 계정이 있으신가요?</span>
            <a th:href="@{/login}">로그인</a>
        </div>
    </div>
</main>

</body>
</html>
