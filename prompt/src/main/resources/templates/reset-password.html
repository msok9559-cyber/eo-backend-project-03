<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기 - Prompt AI</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/reset-password.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/reset-password.js}"></script>
    <script th:src="@{/js/mypage.js}"></script>
</head>
<body>

<!-- nav -->
<nav id="nav">
    <div>
        <a th:href="@{/}" id="nav-logo">Prompt AI</a>
        <div>
            <button id="dark-toggle" aria-label="다크모드 토글"></button>
            <a th:href="@{/guide}" id="nav-guide">도움말</a>

            <!-- 비로그인 상태 -->
            <th:block sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">로그인</a>
                <a th:href="@{/signup}">회원가입</a>
            </th:block>

            <!-- 로그인 상태 -->
            <th:block sec:authorize="isAuthenticated()">
                <button type="button" id="mypage-btn" class="nav-mypage-btn">마이페이지</button>
                <form th:action="@{/logout}" method="post" id="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="nav-logout-btn">로그아웃</button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<!-- 마이페이지 팝업 -->
<div th:insert="~{fragments/mypage-modal :: mypage-modal}"></div>

<!-- reset-password -->
<main id="reset-password">
    <div>
        <div>
            <h1>비밀번호 찾기</h1>
            <p>가입한 이메일로 인증 후 비밀번호를 재설정하세요.</p>
        </div>

        <div id="reset-form">

            <!-- 이메일 -->
            <div class="form-group">
                <label for="email">이메일</label>
                <div class="input-row">
                    <input type="email" id="email" placeholder="이메일을 입력하세요" autocomplete="email">
                    <button type="button" id="send-email-btn">인증번호 발송</button>
                </div>
                <span class="field-msg" id="email-msg"></span>
            </div>

            <!-- 인증번호 -->
            <div class="form-group" id="verify-group">
                <label for="verify-code">인증번호</label>
                <div class="input-row">
                    <input type="text" id="verify-code" placeholder="인증번호를 입력하세요">
                    <button type="button" id="verify-btn">확인</button>
                </div>
                <span class="field-msg" id="verify-msg"></span>
            </div>

            <!-- 새 비밀번호 (인증 완료 후 표시) -->
            <div id="reset-new-password-group">
                <div class="form-group">
                    <label for="reset-new-password">새 비밀번호</label>
                    <input type="password" id="reset-new-password" placeholder="새 비밀번호를 입력하세요 (8자 이상)" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reset-new-password-confirm">새 비밀번호 확인</label>
                    <input type="password" id="reset-new-password-confirm" placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password">
                    <span class="field-msg" id="reset-password-msg"></span>
                </div>
            </div>

            <!-- 에러 메시지 -->
            <div id="reset-error">
                <span id="reset-error-msg"></span>
            </div>

            <!-- 비밀번호 재설정 버튼 (인증 완료 후 표시) -->
            <button type="button" id="reset-btn">비밀번호 재설정</button>

        </div>

        <!-- 하단 링크 -->
        <div id="reset-links">
            <a th:href="@{/login}">로그인으로 돌아가기</a>
        </div>
    </div>
</main>

</body>
</html>
