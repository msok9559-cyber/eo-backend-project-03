<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/login.js}"></script>
    <script th:src="@{/js/mypage.js}"></script>
</head>
<body>

<!-- nav -->
<nav id="nav">
    <div>
        <a th:href="@{/}" id="nav-logo">Prompt AI</a>
        <div>
            <button id="dark-toggle" aria-label="다크모드 토글"></button>
            <a th:href="@{/guide}" id="nav-guide">도움말</a>

            <!-- 비로그인 상태 -->
            <th:block sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">로그인</a>
                <a th:href="@{/signup}">회원가입</a>
            </th:block>

            <!-- 로그인 상태 -->
            <th:block sec:authorize="isAuthenticated()">
                <button type="button" id="mypage-btn" class="nav-mypage-btn">마이페이지</button>
                <form th:action="@{/logout}" method="post" id="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="nav-logout-btn">로그아웃</button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<!-- 마이페이지 팝업 -->
<div th:insert="~{fragments/mypage-modal :: mypage-modal}"></div>

<!-- login  -->
<main id="login">
    <div>
        <div>
            <h1>로그인</h1>
            <p>Prompt AI에 오신 것을 환영합니다.</p>
        </div>

        <!-- 로그인 실패 메시지 -->
        <div id="login-error" th:if="${param.error}">
            <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <!-- 로그인 폼 -->
        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="userid">아이디</label>
                <input type="text" id="userid" name="userid" placeholder="아이디를 입력하세요" autocomplete="username" required>
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
            </div>
            <button type="submit">로그인</button>
        </form>

        <!-- 구분선 -->
        <div id="divider">
            <span></span>
            <span>또는</span>
            <span></span>
        </div>

        <!-- 구글 소셜 로그인 -->
        <div id="social">
            <a th:href="@{/oauth2/authorization/google}">
                <span></span>
                <span>Google로 로그인</span>
            </a>
        </div>

        <!-- 하단 링크 -->
        <div id="login-links">
            <a th:href="@{/signup}">회원가입</a>
            <span></span>
            <a th:href="@{/reset-password}">비밀번호 찾기</a>
        </div>
    </div>
</main>

</body>
</html>
