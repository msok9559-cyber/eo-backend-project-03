<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>결제 - Prompt AI</title>

    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/mypage.js}"></script>
    <script th:src="@{/js/checkout.js}"></script>

    <!-- 포트원 SDK -->
    <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>

<!-- nav -->
<nav id="nav">
    <div>
        <a th:href="@{/}" id="nav-logo">Prompt AI</a>
        <div>
            <button id="dark-toggle" aria-label="다크모드 토글"></button>
            <a th:href="@{/guide}" id="nav-guide">도움말</a>
            <th:block sec:authorize="isAuthenticated()">
                <button type="button" id="mypage-btn" class="nav-mypage-btn">마이페이지</button>
                <form th:action="@{/logout}" method="post" id="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="nav-logout-btn">로그아웃</button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<!-- 마이페이지 팝업 -->
<div th:insert="~{fragments/mypage-modal :: mypage-modal}"></div>

<!-- checkout -->
<main id="checkout">
    <div>

        <div id="checkout-header">
            <a th:href="@{/payment}">← 플랜 안내로 돌아가기</a>
            <h1>결제</h1>
        </div>

        <div id="checkout-body">

            <!-- 플랜 요약 -->
            <div id="checkout-plan">
                <h2>선택한 플랜</h2>
                <div>
                    <span id="plan-name" th:text="${plan != null ? plan.planName : '-'}"></span>
                    <span id="plan-price"
                          th:text="${plan != null ? #numbers.formatInteger(plan.price, 1, 'COMMA') + '원 / 월' : '-'}"></span>
                </div>
                <ul>
                    <li th:if="${plan != null and plan.planName == 'PRO'}">토큰 100,000개 / 월</li>
                    <li th:if="${plan != null and plan.planName == 'PRO'}">알랜 4.0.2 모델 사용</li>
                    <li th:if="${plan != null and plan.planName == 'PRO'}">고급 AI 대화</li>
                    <li th:if="${plan != null and plan.planName == 'PRO'}">우선 응답 처리</li>
                    <li th:if="${plan != null and plan.planName == 'MAX'}">토큰 500,000개 / 월</li>
                    <li th:if="${plan != null and plan.planName == 'MAX'}">알랜 4.0.3 모델 사용</li>
                    <li th:if="${plan != null and plan.planName == 'MAX'}">최상위 AI 대화</li>
                    <li th:if="${plan != null and plan.planName == 'MAX'}">우선 응답 처리</li>
                    <li th:if="${plan != null and plan.planName == 'MAX'}">전용 고객 지원</li>
                </ul>
            </div>

            <!-- 결제자 정보 -->
            <div id="checkout-info">
                <h2>결제자 정보</h2>
                <div>
                    <span>이름</span>
                    <span th:text="${myInfo != null ? myInfo.username : '-'}"></span>
                </div>
                <div>
                    <span>이메일</span>
                    <span th:text="${myInfo != null ? myInfo.email : '-'}"></span>
                </div>
                <div>
                    <span>현재 플랜</span>
                    <span th:text="${myInfo != null ? myInfo.planName : '-'}"></span>
                </div>
            </div>

        </div>

        <!-- 결제 금액 -->
        <div id="checkout-total">
            <span>결제 금액</span>
            <strong th:text="${plan != null ? #numbers.formatInteger(plan.price, 1, 'COMMA') + '원' : '-'}"></strong>
        </div>

        <!-- 에러 메시지 -->
        <div id="checkout-error">
            <span id="checkout-error-msg"></span>
        </div>

        <!-- 결제 버튼 -->
        <button id="checkout-btn"
                th:attr="data-plan-name=${plan != null ? plan.planName : ''},
                         data-plan-price=${plan != null ? plan.price : 0},
                         data-user-name=${myInfo != null ? myInfo.username : ''},
                         data-user-email=${myInfo != null ? myInfo.email : ''}">
            결제하기
        </button>

        <!-- CSRF -->
        <input type="hidden" id="csrf-token" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    </div>
</main>

</body>
</html>
