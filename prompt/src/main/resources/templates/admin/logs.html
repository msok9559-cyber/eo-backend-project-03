<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT 관리자 - 처리 이력</title>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/admin_common.css}">
    <link rel="stylesheet" th:href="@{/css/logs.css}">
</head>
<body>

<div th:replace="admin/fragments/header :: header"></div>
<div th:replace="admin/fragments/sidebar :: sidebar('logs')"></div>

<!-- 메인 영역 -->
<main id="content">
    <!-- 페이지 제목 -->
    <section class="page-header">
        <h1>처리 이력</h1>
        <p>관리자 처리 내역 및 활동 기록 조회</p>
    </section>

    <!-- 검색 / 필터 영역 -->
    <section class="panel">
        <div class="panel-header">
            <h2>검색 조건</h2>
        </div>

        <div class="panel-body">
            <form id="search-form" action="/admin/logs" method="get">
                <div id="search-grid">
                    <div class="form-group">
                        <label for="admin-id">관리자 아이디</label>
                        <input type="text" id="admin-id" name="adminId"
                               th:value="${adminId}"
                               placeholder="관리자 아이디를 입력하세요">
                    </div>

                    <div class="form-group">
                        <label for="action-type">처리 유형</label>
                        <select id="action-type" name="actionType">
                            <option value="" th:selected="${actionType == ''}">전체</option>
                            <option value="LOCK" th:selected="${actionType == 'LOCK'}">잠금 처리</option>
                            <option value="UNLOCK" th:selected="${actionType == 'UNLOCK'}">잠금 해제</option>
                            <option value="WITHDRAW" th:selected="${actionType == 'WITHDRAW'}">탈퇴 처리</option>
                            <option value="RESTORE" th:selected="${actionType == 'RESTORE'}">복구 처리</option>
                            <option value="PLAN_CHANGE" th:selected="${actionType == 'PLAN_CHANGE'}">플랜 변경</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="start-date">시작일</label>
                        <input type="date" id="start-date" name="startDate" th:value="${startDate}">
                    </div>

                    <div class="form-group">
                        <label for="end-date">종료일</label>
                        <input type="date" id="end-date" name="endDate" th:value="${endDate}">
                    </div>
                </div>

                <div id="button-area">
                    <button type="submit" class="btn btn-primary">검색</button>
                    <a th:href="@{/admin/logs}" class="btn btn-secondary">초기화</a>
                </div>
            </form>
        </div>
    </section>

    <!-- 처리 이력 목록 -->
    <section class="panel">
        <div class="panel-header">
            <h2>처리 이력 목록</h2>
        </div>

        <div class="panel-body">
            <div class="table-wrapper">
                <table id="admin-table">
                    <thead>
                        <tr>
                            <th>로그번호</th>
                            <th>관리자 아이디</th>
                            <th>대상 회원번호</th>
                            <th>처리 유형</th>
                            <th>설명</th>
                            <th>처리일시</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${logs.content.isEmpty()}">
                            <td colspan="6">조회된 처리 이력이 없습니다.</td>
                        </tr>

                        <tr th:each="log : ${logs.content}">
                            <td th:text="${log.logId}">1</td>
                            <td th:text="${log.adminId}">admin</td>
                            <td th:text="${log.targetUserId}">1</td>

                            <td>
                                <span class="log-type"
                                      th:classappend="${log.actionType == 'LOCK'} ? ' lock' :
                                                     (${log.actionType == 'UNLOCK'} ? ' unlock' :
                                                     (${log.actionType == 'WITHDRAW'} ? ' delete' :
                                                     (${log.actionType == 'RESTORE'} ? ' restore' :
                                                     (${log.actionType == 'PLAN_CHANGE'} ? ' plan' : ''))))"

                                      th:text="${log.actionType == 'LOCK'} ? '잠금 처리' :
                                               (${log.actionType == 'UNLOCK'} ? '잠금 해제' :
                                               (${log.actionType == 'WITHDRAW'} ? '탈퇴 처리' :
                                               (${log.actionType == 'RESTORE'} ? '복구 처리' :
                                               (${log.actionType == 'PLAN_CHANGE'} ? '플랜 변경' : ''))))">
                                </span>
                            </td>

                            <td th:text="${log.description}">설명</td>

                            <td th:text="${#temporals.format(log.createdAt,'yyyy-MM-dd HH:mm')}">
                                2026-03-11
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이징 -->
            <div id="pagination">
                <a class="page-btn"
                   th:if="${logs.hasPrevious()}"
                   th:href="@{/admin/logs(page=${logs.number - 1}, adminId=${adminId}, actionType=${actionType}, startDate=${startDate}, endDate=${endDate})}">
                    이전
                </a>

                <th:block th:if="${logs.totalPages > 0}">
                    <a class="page-btn"
                       th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
                       th:text="${i + 1}"
                       th:classappend="${i == logs.number} ? ' active'"
                       th:href="@{/admin/logs(page=${i}, adminId=${adminId}, actionType=${actionType}, startDate=${startDate}, endDate=${endDate})}">
                    </a>
                </th:block>

                <a class="page-btn"
                   th:if="${logs.hasNext()}"
                   th:href="@{/admin/logs(page=${logs.number + 1}, adminId=${adminId}, actionType=${actionType}, startDate=${startDate}, endDate=${endDate})}">
                    다음
                </a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
