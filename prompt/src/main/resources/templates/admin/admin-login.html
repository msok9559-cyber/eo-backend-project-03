<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <link rel="stylesheet" th:href="@{/css/reset.css}">
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>
<body>
<main id="admin-login-page">
    <div>
        <h1>PROMPT 관리자 로그인</h1>

        <form id="admin-login-form" method="post" action="/admin/login">
            <div class="form-group">
                <label for="adminId">관리자 아이디</label>
                <input type="text" id="adminId" name="adminId" placeholder="관리자 아이디를 입력하세요">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
            </div>

            <button type="submit" id="admin-login-btn">로그인</button>
        </form>

        <p id="login-error" th:if="${param.error}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </p>
    </div>
</main>
</body>
</html>
